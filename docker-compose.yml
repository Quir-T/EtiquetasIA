services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_DSN: ${DATABASE_DSN}
      DB_SSL_MODE: ${DB_SSL_MODE}
      DB_SSL_CA: ${DB_SSL_CA}
      DB_SSL_CERT: ${DB_SSL_CERT}
      DB_SSL_KEY: ${DB_SSL_KEY}
      NLP_PROVIDER: ${NLP_PROVIDER:-google}
      QWEN_NLP_ENDPOINT: ${QWEN_NLP_ENDPOINT:-http://host.docker.internal:11434/api/generate}
      QWEN_NLP_MODEL: ${QWEN_NLP_MODEL:-qwen2.5:7b-instruct}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
    ports:
      - "8000:8000"
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/src"]
    volumes:
      - ./src:/app/src:ro
      - ./certs:/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - internal

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: anamnesis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d anamnesis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
